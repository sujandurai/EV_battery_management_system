CONFIG_MAIN_STACK_SIZE=4096
CONFIG_HEAP_MEM_POOL_SIZE=16384

# Multithreading (4 threads: volt, temp, gas, print)
CONFIG_MULTITHREADING=y
CONFIG_NUM_PREEMPT_PRIORITIES=16
CONFIG_TIMESLICING=y

# ADC
CONFIG_ADC=y
CONFIG_ADC_STM32=y
CONFIG_ADC_ASYNC=n

# GPIO (for DS18B20 OneWire)
CONFIG_GPIO=y

# I2C (for GY-521 MPU-6050)
CONFIG_I2C=y

# Math (for powf, fabsf)
CONFIG_FPU=y
CONFIG_FPU_SHARING=y
CONFIG_CBPRINTF_FP_SUPPORT=y
CONFIG_REQUIRES_FLOAT_PRINTF=y

# Logging
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3
CONFIG_UART_CONSOLE=y

# Memory protection (Cortex-M33 TZ off for simplicity)
CONFIG_ARM_MPU=y
CONFIG_TRUSTED_EXECUTION_NONSECURE=n
